repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.18
    hooks:
      - id: ruff-check
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.18.2
    hooks:
      - id: mypy
        args:
          - --explicit-package-bases
          - src
        pass_filenames: false

  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: python -m pytest tests -v
        language: system
        pass_filenames: false
        always_run: true